<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>修改密码 - AI 图片工作台</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body data-page="password">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="/"><span class="brand-mark" id="siteIcon">AI</span><span id="siteName">AI 图片工作台</span></a>
      <nav class="nav-list">
        <a class="nav-item" href="/">工作台</a>
        <a class="nav-item" href="/gallery.html">画廊</a>
        <a class="nav-item admin-link hidden" href="/admin.html">设置</a>
        <button type="button" class="nav-item nav-button" id="logoutBtn">退出</button>
      </nav>
      <div class="sidebar-card">
        <p class="muted">当前用户</p>
        <strong id="currentUser">加载中...</strong>
        <span id="adminBadge" class="badge hidden">管理员</span>
        <details class="user-menu">
          <summary class="user-menu-trigger">更多</summary>
          <div class="user-menu-panel">
            <a class="user-menu-link active" href="/password.html">账户安全 · 修改密码</a>
          </div>
        </details>
      </div>
    </aside>

    <main class="main-panel password-page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Security</p>
          <h1>修改密码</h1>
        </div>
        <a class="ghost-link" href="/">返回工作台</a>
      </header>

      <section class="card password-card standalone-password-card">
        <p class="eyebrow">Account Security</p>
        <h2>更新登录密码</h2>
        <form id="passwordForm" class="stack-form password-form">
          <label><span>当前密码</span><input name="current_password" type="password" autocomplete="current-password" required minlength="6"></label>
          <label><span>新密码</span><input name="new_password" type="password" autocomplete="new-password" required minlength="6"></label>
          <div class="button-row password-button-row">
            <button class="primary-button" type="submit">更新密码</button>
          </div>
        </form>
        <p class="status-line" id="passwordStatus"></p>
      </section>
    </main>
  </div>
  <script src="/assets/js/password.js"></script>
</body>
</html>
