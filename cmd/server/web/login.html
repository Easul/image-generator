<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - AI 图片工作台</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-page" data-page="login">
  <main class="auth-card card">
    <a class="brand centered" href="/">
      <span class="brand-mark">AI</span>
      <span>AI 图片工作台</span>
    </a>
    <h1>欢迎回来</h1>
    <p class="muted">登录后继续生成、编辑和管理你的图片。</p>
    <form id="loginForm" class="stack-form">
      <label>
        <span>用户名</span>
        <input name="username" autocomplete="username" required minlength="3">
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" autocomplete="current-password" required minlength="6">
      </label>
      <button class="primary-button" type="submit">登录</button>
    </form>
    <p class="auth-switch">还没有账号？<a href="/register.html">立即注册</a></p>
    <p class="status-line" id="authStatus"></p>
  </main>
  <script src="/assets/js/auth.js"></script>
</body>
</html>
